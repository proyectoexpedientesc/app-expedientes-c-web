<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Título de la pestaña en el navegador -->
    <title>Los Expedientes C</title>
    
    <!-- Descripción que aparecerá en Google y al compartir el enlace -->
    <!-- Le dice explícitamente a Google que indexe tu página y siga sus enlaces -->
    <meta name="robots" content="index, follow">

    <!-- Open Graph: Configura cómo se ve el enlace al compartirlo en redes sociales o WhatsApp -->
    <meta property="og:title" content="Los Expedientes C">
    <meta property="og:description" content="Registro de Vándalos de Cuello y Corbata">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://app-expedientes-c-web.vercel.app/preview-expedientes.png">
    
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
